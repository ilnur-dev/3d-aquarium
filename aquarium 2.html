<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Glass Aquarium</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
        }
        h1 { margin: 0; font-size: 26px; font-weight: 300; letter-spacing: 2px; }
        p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CLOWNFISH AQUARIUM</h1>
        <p>Drag to rotate &bull; Scroll to zoom</p>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Scene, Camera, Renderer Setup
        const scene = new THREE.Scene();
        
        // Custom background gradient
        const canvasBg = document.createElement('canvas');
        canvasBg.width = 2;
        canvasBg.height = 512;
        const ctxBg = canvasBg.getContext('2d');
        const grad = ctxBg.createLinearGradient(0, 0, 0, 512);
        grad.addColorStop(0, '#0a1628');
        grad.addColorStop(1, '#1a3a5c');
        ctxBg.fillStyle = grad;
        ctxBg.fillRect(0, 0, 2, 512);
        const bgTex = new THREE.CanvasTexture(canvasBg);
        bgTex.colorSpace = THREE.SRGBColorSpace;
        scene.background = bgTex;

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.minDistance = 3;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. Lighting
        scene.add(new THREE.AmbientLight(0xb3e5fc, 0.5));

        const dirLight = new THREE.DirectionalLight(0xfff8e1, 1.2);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffe0b2, 1.0, 10);
        pointLight.position.set(0, 3.8, 0);
        scene.add(pointLight);

        // 3. Aquarium Construction
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xe0f7fa,
            metalness: 0.1,
            roughness: 0.0,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide,
            depthWrite: true
        });

        const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });

        function createBox(w, h, d, x, y, z, mat, castShadow=false) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            if(castShadow) mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // Table (to catch shadows and anchor the tank)
        createBox(12, 0.5, 8, 0, -0.25, 0, new THREE.MeshStandardMaterial({ color: 0x2c1f18, roughness: 1.0 }));

        // Glass Panels
        const th = 0.1;
        createBox(6, th, 3,  0, 0.05, 0, glassMat); // bottom
        createBox(th, 4, 3, -2.95, 2, 0, glassMat); // left
        createBox(th, 4, 3,  2.95, 2, 0, glassMat); // right
        createBox(6, 4, th,  0, 2,  1.45, glassMat); // front
        createBox(6, 4, th,  0, 2, -1.45, glassMat); // back

        // Frames
        const fTh = 0.15;
        // Top
        createBox(6+fTh, fTh, fTh,  0, 4,  1.45+fTh/2, frameMat);
        createBox(6+fTh, fTh, fTh,  0, 4, -1.45-fTh/2, frameMat);
        createBox(fTh, fTh, 3+fTh, -3.0, 4,  0, frameMat);
        createBox(fTh, fTh, 3+fTh,  3.0, 4,  0, frameMat);
        // Pillars
        createBox(fTh, 4, fTh, -3.0, 2,  1.45+fTh/2, frameMat);
        createBox(fTh, 4, fTh,  3.0, 2,  1.45+fTh/2, frameMat);
        createBox(fTh, 4, fTh, -3.0, 2, -1.45-fTh/2, frameMat);
        createBox(fTh, 4, fTh,  3.0, 2, -1.45-fTh/2, frameMat);
        // Bottom
        createBox(6+fTh, fTh, fTh,  0, 0,  1.45+fTh/2, frameMat);
        createBox(6+fTh, fTh, fTh,  0, 0, -1.45-fTh/2, frameMat);
        createBox(fTh, fTh, 3+fTh, -3.0, 0,  0, frameMat);
        createBox(fTh, fTh, 3+fTh,  3.0, 0,  0, frameMat);

        // 4. Water Volume
        const waterGeo = new THREE.BoxGeometry(5.8, 3.55, 2.8, 32, 1, 16);
        waterGeo.translate(0, 3.55/2 + 0.1, 0);
        const waterMat = new THREE.MeshPhysicalMaterial({
            color: 0x1e88e5,
            metalness: 0.1,
            roughness: 0.1,
            transparent: true,
            opacity: 0.25,
            depthWrite: false
        });
        const waterMesh = new THREE.Mesh(waterGeo, waterMat);
        scene.add(waterMesh);
        const waterInitPos = Float32Array.from(waterGeo.attributes.position.array);

        // 5. Environment Details
        // Stones
        const stoneColors = [0x8D6E63, 0xA1887F, 0x9E9E9E, 0x6D4C41, 0x4E342E];
        for(let i=0; i<35; i++) {
            const rad = 0.05 + Math.random() * 0.15;
            const geo = new THREE.DodecahedronGeometry(rad, 1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: stoneColors[Math.floor(Math.random() * stoneColors.length)], 
                roughness: 0.9 
            });
            const stone = new THREE.Mesh(geo, mat);
            stone.scale.y = 0.5 + Math.random() * 0.5;
            stone.position.set(
                (Math.random() - 0.5) * 5.6,
                rad * stone.scale.y / 2 + 0.1,
                (Math.random() - 0.5) * 2.6
            );
            stone.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
            stone.castShadow = true;
            stone.receiveShadow = true;
            scene.add(stone);
        }

        // Plants
        const plantMeshes = [];
        function createPlantCluster(x, z, count, mainColor) {
            const cluster = new THREE.Group();
            cluster.position.set(x, 0.1, z);
            for(let i=0; i<count; i++) {
                const height = 0.8 + Math.random() * 1.5;
                const width = 0.1 + Math.random() * 0.05;
                const geo = new THREE.PlaneGeometry(width, height, 1, 10);
                geo.translate(0, height/2, 0);
                
                const initPos = Float32Array.from(geo.attributes.position.array);
                geo.userData = { 
                    initPos, 
                    phase: Math.random() * Math.PI * 2, 
                    speed: 1.5 + Math.random() 
                };
                
                const mat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(mainColor).lerp(new THREE.Color(0xffffff), Math.random() * 0.1 - 0.05),
                    side: THREE.DoubleSide,
                    roughness: 0.9
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.y = Math.random() * Math.PI;
                mesh.position.set((Math.random() - 0.5)*0.3, 0, (Math.random() - 0.5)*0.3);
                mesh.castShadow = true;
                cluster.add(mesh);
                plantMeshes.push(mesh);
            }
            scene.add(cluster);
        }
        createPlantCluster(-2.5, -1.0, 8, 0x2E7D32);
        createPlantCluster(2.5, -1.0, 6, 0x388E3C);
        createPlantCluster(-2.0, 1.0, 5, 0x1B5E20);
        createPlantCluster(2.0, 0.8, 7, 0x4CAF50);

        // Bubbles
        const bubbles = [];
        const bubbleGeo = new THREE.SphereGeometry(0.025, 8, 8);
        const bubbleMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.9,
            roughness: 0.1,
            ior: 1.1,
            transparent: true,
            opacity: 0.6
        });
        const bubbleSources = [
            new THREE.Vector3(-2.2, 0.2, -0.8),
            new THREE.Vector3(1.8, 0.2, 0.6)
        ];

        // 6. Fish Generation
        const finsMat = new THREE.MeshStandardMaterial({ color: 0xFF6D00, roughness: 0.6, side: THREE.DoubleSide });
        const edgeLineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        
        // Procedural clownfish texture
        const fishCanvas = document.createElement('canvas');
        fishCanvas.width = 512; fishCanvas.height = 512;
        const fishCtx = fishCanvas.getContext('2d');
        fishCtx.fillStyle = '#FF6D00';
        fishCtx.fillRect(0, 0, 512, 512);
        
        function drawBelt(vCenter, thickness) {
            const y = 512 * (1 - vCenter);
            const h = 512 * thickness;
            fishCtx.fillStyle = '#000000';
            fishCtx.fillRect(0, y - h/2 - 6, 512, h + 12);
            fishCtx.fillStyle = '#FFFFFF';
            fishCtx.fillRect(0, y - h/2, 512, h);
        }
        drawBelt(0.75, 0.1);
        drawBelt(0.5, 0.12);
        drawBelt(0.25, 0.08);
        
        const fishTex = new THREE.CanvasTexture(fishCanvas);
        fishTex.colorSpace = THREE.SRGBColorSpace;
        fishTex.wrapS = THREE.RepeatWrapping;

        class Clownfish {
            constructor(scale) {
                this.group = new THREE.Group();
                this.group.scale.setScalar(scale);

                // Body
                const bodyGeo = new THREE.SphereGeometry(1, 32, 32);
                bodyGeo.rotateX(Math.PI / 2); // Map V along Z
                bodyGeo.scale(0.18, 0.35, 0.65);
                const bodyMat = new THREE.MeshStandardMaterial({ map: fishTex, roughness: 0.5 });
                this.body = new THREE.Mesh(bodyGeo, bodyMat);
                this.body.castShadow = true;
                this.group.add(this.body);

                // Fin setup helper
                const makeFin = (shape, rx, ry, rz, px, py, pz) => {
                    const geo = new THREE.ShapeGeometry(shape);
                    const mesh = new THREE.Mesh(geo, finsMat);
                    mesh.rotation.set(rx, ry, rz);
                    mesh.position.set(px, py, pz);
                    mesh.castShadow = true;
                    // Add outline
                    const outline = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeLineMat);
                    mesh.add(outline);
                    return mesh;
                };

                // Tail
                const tailShape = new THREE.Shape();
                tailShape.moveTo(0, 0);
                tailShape.quadraticCurveTo(0.2, 0.2, 0.8, 0.4);
                tailShape.quadraticCurveTo(0.6, 0.1, 0.6, 0);
                tailShape.quadraticCurveTo(0.6, -0.1, 0.8, -0.4);
                tailShape.quadraticCurveTo(0.2, -0.2, 0, 0);
                this.tail = makeFin(tailShape, 0, Math.PI/2, 0,  0, 0, -0.62);
                this.group.add(this.tail);

                // Dorsal
                const dorsalShape = new THREE.Shape();
                dorsalShape.moveTo(0, 0);
                dorsalShape.quadraticCurveTo(0.2, 0.3, 0.6, 0.25);
                dorsalShape.lineTo(0.9, 0);
                dorsalShape.quadraticCurveTo(0.5, 0.1, 0, 0);
                this.dorsal = makeFin(dorsalShape, 0, Math.PI/2, 0,  0, 0.32, 0.2);
                this.group.add(this.dorsal);

                // Anal
                const analShape = new THREE.Shape();
                analShape.moveTo(0, 0);
                analShape.quadraticCurveTo(0.2, -0.2, 0.5, -0.15);
                analShape.lineTo(0.6, 0);
                this.anal = makeFin(analShape, 0, Math.PI/2, 0,  0, -0.32, 0.1);
                this.group.add(this.anal);

                // Pectorals
                const pecShape = new THREE.Shape();
                pecShape.moveTo(0, 0);
                pecShape.bezierCurveTo(0.1, 0.1, 0.3, 0.1, 0.4, -0.1);
                pecShape.bezierCurveTo(0.3, -0.2, 0.1, -0.2, 0, 0);
                this.pecR = makeFin(pecShape, -Math.PI/6, Math.PI/5, 0,  0.15, -0.1, 0.3);
                this.pecL = makeFin(pecShape, -Math.PI/6, Math.PI - Math.PI/5, 0,  -0.15, -0.1, 0.3);
                this.group.add(this.pecR);
                this.group.add(this.pecL);

                // Eyes
                const eyeGeo = new THREE.SphereGeometry(0.035, 16, 16);
                const pupilGeo = new THREE.SphereGeometry(0.015, 16, 16);
                const eyeWt = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
                const eyeBk = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1 });

                const eyeR = new THREE.Mesh(eyeGeo, eyeWt);
                eyeR.position.set(0.15, 0.15, 0.5);
                const pupR = new THREE.Mesh(pupilGeo, eyeBk);
                pupR.position.set(0.025, 0, 0.015);
                eyeR.add(pupR);
                this.group.add(eyeR);

                const eyeL = new THREE.Mesh(eyeGeo, eyeWt);
                eyeL.position.set(-0.15, 0.15, 0.5);
                const pupL = new THREE.Mesh(pupilGeo, eyeBk);
                pupL.position.set(-0.025, 0, 0.015);
                eyeL.add(pupL);
                this.group.add(eyeL);

                // Setup movement
                this.target = new THREE.Vector3();
                this.baseSpeed = 0.005 + Math.random() * 0.01;
                this.timeOffset = Math.random() * 100;
                this.pickNewTarget();
                this.group.position.copy(this.target);
                
                scene.add(this.group);
            }

            pickNewTarget() {
                this.target.set(
                    (Math.random() - 0.5) * 5.0,
                    0.5 + Math.random() * 2.5,
                    (Math.random() - 0.5) * 2.0
                );
            }

            update(time, delta) {
                // Navigation
                const dummy = new THREE.Object3D();
                dummy.position.copy(this.group.position);
                dummy.lookAt(this.target);
                
                this.group.quaternion.slerp(dummy.quaternion, delta * 2.5);
                
                const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.group.quaternion);
                this.group.position.add(forward.multiplyScalar(this.baseSpeed * (delta * 60)));
                
                if (this.group.position.distanceTo(this.target) < 0.4) {
                    this.pickNewTarget();
                }

                // Animation
                const wagPhase = time * (this.baseSpeed * 600) + this.timeOffset;
                
                this.tail.rotation.y = Math.PI/2 + Math.sin(wagPhase) * 0.5;
                this.body.rotation.y = Math.sin(wagPhase) * 0.1;
                
                this.pecR.rotation.x = -Math.PI/6 + Math.cos(wagPhase) * 0.2;
                this.pecL.rotation.x = -Math.PI/6 + Math.cos(wagPhase) * 0.2;
                
                this.dorsal.rotation.z = Math.sin(time*2 + this.timeOffset) * 0.05;
                this.anal.rotation.z = Math.cos(time*2 + this.timeOffset) * 0.05;
            }
        }

        const fishes = [
            new Clownfish(0.9),
            new Clownfish(1.0),
            new Clownfish(1.1)
        ];

        // 7. Animation Loop
        let lastTime = performance.now();

        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = Math.min((currentTime - lastTime) / 1000, 0.1);
            lastTime = currentTime;
            const time = currentTime * 0.001;

            controls.update();

            // Fish Update
            fishes.forEach(f => f.update(time, delta));

            // Water Ripples
            const wp = waterGeo.attributes.position;
            for(let i=0; i<wp.count; i++) {
                if (waterInitPos[i*3+1] > 3.0) { // animate top surface only
                    const nx = waterInitPos[i*3];
                    const nz = waterInitPos[i*3+2];
                    const dy = Math.sin(nx * 2 + time * 2) * 0.03 + Math.cos(nz * 3 + time * 1.5) * 0.02;
                    wp.setY(i, waterInitPos[i*3+1] + dy);
                }
            }
            wp.needsUpdate = true;
            waterGeo.computeVertexNormals();

            // Plants Sway
            for(let m of plantMeshes) {
                const geo = m.geometry;
                const pos = geo.attributes.position;
                const init = geo.userData.initPos;
                const pTime = time * geo.userData.speed + geo.userData.phase;
                
                for(let v=0; v<pos.count; v++) {
                    const y = init[v*3+1];
                    if(y > 0.1) {
                        const sway = y * 0.08;
                        pos.setX(v, init[v*3] + Math.sin(pTime) * sway);
                        pos.setZ(v, init[v*3+2] + Math.cos(pTime * 0.8) * sway * 0.5);
                    }
                }
                pos.needsUpdate = true;
            }

            // Bubbles
            if(Math.random() < 0.15) {
                const src = bubbleSources[Math.floor(Math.random() * bubbleSources.length)];
                const b = new THREE.Mesh(bubbleGeo, bubbleMat);
                b.position.set(src.x + (Math.random()-0.5)*0.2, src.y, src.z + (Math.random()-0.5)*0.2);
                b.userData = { px: Math.random()*10, pz: Math.random()*10, speed: 0.015+Math.random()*0.015, wobble: 0.005+Math.random()*0.01 };
                scene.add(b);
                bubbles.push(b);
            }
            for(let i=bubbles.length-1; i>=0; i--) {
                const b = bubbles[i];
                b.position.y += b.userData.speed * (delta * 60);
                b.position.x += Math.sin(time*5 + b.userData.px) * b.userData.wobble;
                b.position.z += Math.cos(time*4 + b.userData.pz) * b.userData.wobble;
                if(b.position.y > 3.65) {
                    scene.remove(b);
                    bubbles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(lastTime);
    </script>
</body>
</html>
